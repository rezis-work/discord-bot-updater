# 11:00 AM Georgia (Tbilisi) ≈ 07:00 UTC (UTC+4, no DST). Slightly early to offset Actions delay.
name: Daily Discord webhook

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE: ${{ secrets.DISCORD_MESSAGE }}
        run: npm run daily

# TEST: 12:27 AM Tbilisi = 20:27 UTC (Georgia is UTC+4, no DST).
# After testing, use noon Tbilisi: cron "0 8 * * *" (12:00 PM Tbilisi).
name: Daily Discord webhook

on:
  schedule:
    - cron: "27 20 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE: ${{ secrets.DISCORD_MESSAGE }}
        run: npm run daily
